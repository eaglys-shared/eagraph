name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p eagraph-cli

      - name: Package tarball
        run: |
          staging="eagraph-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/eagraph" "$staging/"
          cp README.md LICENSE "$staging/" 2>/dev/null || true
          tar -czf "${staging}.tar.gz" "$staging"
          shasum -a 256 "${staging}.tar.gz" > "${staging}.tar.gz.sha256"
          echo "ARCHIVE=${staging}.tar.gz" >> "$GITHUB_ENV"
          echo "CHECKSUM=${staging}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.CHECKSUM }}
